<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WindFlow Studio v1.0 — WAsP/WindPRO-like Open Workflow</title>
  <link rel="stylesheet" href="src/css/styles.css" />
</head>
<body>
<header class="topbar">
  <div class="brand"><span class="logo">⟁</span><div><b>WindFlow Studio</b><small>v1.0 · WAsP-like flow · WindPRO-like TS</small></div></div>
  <div class="actions">
    <button id="btnDemo">Demo Site</button>
    <button id="btnRun" class="primary">Run Flow + AEP</button>
    <button id="btnReport">Export HTML Report</button>
  </div>
</header>
<main class="layout">
  <aside class="panel left">
    <section>
      <h2>1 · Project</h2>
      <label>Project name<input id="projectName" value="New Wind Project"></label>
      <div class="grid2"><label>Site lat<input id="siteLat" type="number" step="0.00001" value="24.3125"></label><label>Site lon<input id="siteLon" type="number" step="0.00001" value="44.3750"></label></div>
      <div class="grid2"><label>Hub height m<input id="hubHeight" type="number" value="144"></label><label>Mast height m<input id="mastHeight" type="number" value="100"></label></div><div class="grid2"><label>Rotor D m<input id="rotorD" type="number" value="210"></label><label>Wake model<select id="wakeModel"><option value="jensen">Jensen/PARK</option><option value="eddy">Eddy viscosity</option><option value="park2">PARK2 deep array</option></select></label></div>
      <div class="grid2"><label>Rated kW<input id="ratedKW" type="number" value="11000"></label><label>Other losses %<input id="lossPct" type="number" value="5" step="0.1"></label></div><div class="grid2"><label>Wake combination<select id="wakeCombination"><option value="rss">RSS</option><option value="linear">Linear</option></select></label><label>Reference z₀<input id="z0ref" type="number" value="0.05" step="0.001"></label></div>
      <div class="grid2"><label>Wake k<input id="wakeK" type="number" value="0.04" step="0.005"></label><label>Roughness z₀ m<input id="z0" type="number" value="0.03" step="0.001"></label></div>
    </section>
    <section>
      <h2>2 · Layout</h2>
      <div class="row"><input id="layoutFile" type="file" accept=".csv,.txt,.kml"/><button id="btnLoadLayout">Load</button></div>
      <p class="hint">CSV columns: name,lat,lon[,hh]. KML text files with Point coordinates are also accepted.</p>
      <div class="grid3"><input id="gridRows" type="number" value="3"><input id="gridCols" type="number" value="4"><input id="gridSpacingD" type="number" value="7"></div>
      <button id="btnGrid">Generate Grid Around Site</button>
      <div class="stat"><b id="layoutCount">0</b> turbines · <span id="capacityMW">0 MW</span></div>
    </section>
    <section>
      <h2>3 · Data Download</h2>
      <div class="grid2"><label>Terrain radius km<input id="terrainRadius" type="number" value="8"></label><label>Grid<input id="terrainGrid" type="number" value="40"></label></div>
      <div class="grid2"><label>Contour interval<input id="contourInt" value="auto"></label><label>ERA5 years<input id="eraYears" value="2021-2023"></label></div>
      <button id="btnTerrain">Download Terrain + Contours</button>
      <button id="btnRoughness">Download OSM Roughness</button>
      <button id="btnGWA">Download GWA Point Climate</button>
      <button id="btnERA5">Download ERA5 Time Series</button><div class="row"><input id="mastClimateFile" type="file" accept=".csv,.txt"><button id="btnMastClimate">Import LT Mast Climate</button></div><div class="row"><input id="mastTsFile" type="file" accept=".csv,.txt"><button id="btnMastTS">Import Mast/Windographer TS</button></div><div class="row"><input id="obstacleFile" type="file" accept=".csv,.txt"><button id="btnObstacles">Import Obstacles</button></div><div class="row"><input id="pcFile" type="file" accept=".csv,.txt"><button id="btnPowerCurve">Import Power/CT Curve</button></div>
      <div id="dataStatus" class="log small">Ready.</div>
    </section>
  </aside>
  <section class="workspace">
    <div class="tabs"><button class="tab active" data-tab="map">Map</button><button class="tab" data-tab="wind">Wind Climate</button><button class="tab" data-tab="aep">AEP</button><button class="tab" data-tab="ts">Time Series</button><button class="tab" data-tab="log">Log</button></div>
    <div class="tabbody active" id="tab-map"><canvas id="mapCanvas" width="1000" height="650"></canvas></div>
    <div class="tabbody" id="tab-wind"><div id="windSummary" class="cards"></div><table id="sectorTable"></table></div>
    <div class="tabbody" id="tab-aep"><div id="aepSummary" class="cards"></div><table id="turbineTable"></table></div>
    <div class="tabbody" id="tab-ts"><div class="row"><button id="btnTS">Run WindPRO-like Time Series</button><button id="btnCSV">Export TS CSV</button></div><div id="tsSummary" class="cards"></div><table id="tsTable"></table><canvas id="tsCanvas" width="1000" height="240"></canvas></div>
    <div class="tabbody" id="tab-log"><pre id="log"></pre></div>
  </section>
</main>
<script type="module" src="src/js/main.js"></script>
</body>
</html>
